<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>Braves Prospect Card Generator</title>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
body {
  font-family: Arial, sans-serif;
  padding: 20px;
}
#card {
  margin-top: 20px;
}
.card {
  border: 3px solid #000;
  padding: 20px;
  width: 350px;
  background: #fff;
}
h2 {
  margin-top: 0;
}
button {
  margin-left: 8px;
}
</style>
</head>

<body>

<h1>Braves Prospect Card Generator</h1>

<select id="playerSelect"></select>
<button onclick="generateCard()">Generate</button>
<button onclick="exportPNG()">Export PNG</button>

<div id="card"></div>

<script>
const SHEET_URL =
  "https://docs.google.com/spreadsheets/d/13D5cvWOVv9u7zOOQzT_jIoAMSu05NSWpX3KV4Y_aT0A/export?format=csv";

let players = [];

function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  return lines.map(line => {
    let result = [];
    let current = "";
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const char = line[i];

      if (char === '"') {
        inQuotes = !inQuotes;
      } else if (char === ',' && !inQuotes) {
        result.push(current);
        current = "";
      } else {
        current += char;
      }
    }

    result.push(current);
    return result;
  });
}

fetch(SHEET_URL)
  .then(response => response.text())
  .then(text => {
    const rows = parseCSV(text);
    const headers = rows[0];

    players = rows.slice(1).map(row => {
      let obj = {};
      headers.forEach((header, i) => {
        obj[header.trim()] = row[i] || "";
      });
      return obj;
    });

    const select = document.getElementById("playerSelect");

    players.forEach((player, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = player.Name || "Unknown Player";
      select.appendChild(option);
    });
  });

function generateCard() {
  const index = document.getElementById("playerSelect").value;
  const p = players[index];
  if (!p) return;

  document.getElementById("card").innerHTML = `
    <div class="card" id="playerCard">
      <h2>${p.Name || ""}</h2>
      <p><strong>Level:</strong> ${p.Level || ""}</p>
      <p><strong>AgeDiff:</strong> ${p.AgeDiff || ""}</p>
      <p><strong>Final Score:</strong> ${p["Final Score"] || ""}</p>
      <p><strong>ISO:</strong> ${p.ISO || ""}</p>
      <p><strong>Contact%:</strong> ${p["Contact%"] || ""}</p>
      <p><strong>BB/K:</strong> ${p["BB/K"] || ""}</p>
      <p><strong>Updated:</strong> ${p.LastUpdated || ""}</p>
    </div>
  `;
}

async function exportPNG() {
  const card = document.getElementById("playerCard");
  if (!card) return;

  const canvas = await html2canvas(card);
  const link = document.createElement("a");
  link.download = "player_card.png";
  link.href = canvas.toDataURL("image/png");
  link.click();
}
</script>

</body>
</html>
