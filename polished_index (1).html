<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Braves Prospect Card Generator</title>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <style>
    :root{--navy:#071528;--navy2:#0b203a;--red:#ce1432;--red2:#9f1028;--gold:#f6c84c;--green:#22c55e;--yellow:#fbbf24;--bad:#ef4444;--ink:#f8fafc;--muted:#9fb0c8;--line:rgba(255,255,255,.16);--shadow:0 18px 45px rgba(0,0,0,.35)}
    *{box-sizing:border-box} body{margin:0;padding:18px;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:#e9eef5;color:#0f172a}.appTop{max-width:1180px;margin:0 auto 14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center;justify-content:space-between}.appTitle{font-weight:950;font-size:22px;color:#10233d}.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center}select,button{border:1px solid #cbd5e1;border-radius:10px;padding:10px 12px;background:#fff;font-weight:800;color:#10233d}button{background:#10233d;color:#fff;border-color:#10233d}#status{max-width:1180px;margin:0 auto 12px;color:#64748b;font-size:13px;font-weight:700}.stage{display:flex;justify-content:center}
    .card{width:min(1180px,100%);background:radial-gradient(900px 520px at 80% -15%,rgba(206,20,50,.26),transparent 58%),radial-gradient(650px 420px at 0% 0%,rgba(57,114,184,.34),transparent 55%),linear-gradient(135deg,var(--navy),var(--navy2) 55%,#07111f);color:var(--ink);border:2px solid rgba(255,255,255,.2);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);position:relative}.card:before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(255,255,255,.05) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px);background-size:46px 46px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.7),transparent 75%);pointer-events:none}
    .hero{position:relative;padding:24px;display:grid;grid-template-columns:150px 1fr 180px;gap:22px;align-items:center;border-bottom:1px solid var(--line)}.headshot{width:150px;height:150px;border-radius:22px;background:linear-gradient(135deg,#dbeafe,#f8fafc);border:3px solid var(--red);overflow:hidden;display:flex;align-items:center;justify-content:center;color:#334155;font-weight:950;font-size:18px;box-shadow:0 12px 24px rgba(0,0,0,.25)}.headshot img{width:100%;height:100%;object-fit:cover;display:block}.rankName{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}.rank{color:var(--red);font-size:34px;font-weight:950}.name{margin:0;font-size:48px;line-height:1;font-weight:1000;text-transform:uppercase;letter-spacing:.5px;text-shadow:0 3px 0 rgba(0,0,0,.18)}.subtitle{margin-top:8px;color:#ffccd5;font-size:17px;font-weight:950;text-transform:uppercase;letter-spacing:.8px}.pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:14px}.pill{border:1px solid rgba(255,255,255,.22);background:rgba(255,255,255,.08);border-radius:999px;padding:8px 12px;font-weight:900;font-size:13px;color:#dbeafe}.scoreBox{border:3px solid var(--red);border-radius:18px;padding:16px 12px;text-align:center;background:rgba(2,6,23,.45)}.scoreBox .k{font-size:13px;font-weight:950;color:#dbeafe;text-transform:uppercase;letter-spacing:.9px}.scoreBox .v{font-size:62px;font-weight:1000;line-height:.95;margin-top:8px}.scoreBox .s{color:#ffccd5;font-size:12px;font-weight:900;margin-top:8px}
    .primaryBand{margin:0 24px 18px;display:grid;grid-template-columns:1fr 1fr;gap:12px}.callout{border:1px solid var(--line);border-left:6px solid var(--gold);background:rgba(255,255,255,.075);border-radius:15px;padding:13px 15px}.callout .k{font-size:12px;color:var(--muted);font-weight:950;text-transform:uppercase;letter-spacing:.7px}.callout .v{margin-top:5px;font-size:18px;font-weight:950;color:#fff}.summaryGrid{padding:0 24px 18px;display:grid;grid-template-columns:repeat(6,1fr);gap:0}.summaryCell{border:1px solid var(--line);background:rgba(255,255,255,.055);padding:14px 10px;text-align:center;min-height:86px}.summaryCell:first-child{border-radius:14px 0 0 14px}.summaryCell:last-child{border-radius:0 14px 14px 0}.summaryCell .k{font-size:12px;color:var(--muted);font-weight:950;text-transform:uppercase;letter-spacing:.6px}.summaryCell .v{margin-top:8px;font-size:30px;font-weight:1000}.summaryCell .s{margin-top:5px;font-size:12px;font-weight:900;color:#b9c7db}
    .mainGrid{padding:0 24px 22px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}.panel{border:1px solid var(--line);border-radius:16px;background:rgba(2,6,23,.28);overflow:hidden;min-height:250px}.panelTitle{background:linear-gradient(90deg,var(--red2),var(--red));color:#fff;text-align:center;padding:10px 12px;font-weight:950;text-transform:uppercase;letter-spacing:.7px;font-size:15px}.statRows{padding:12px 14px}.metricRow{display:grid;grid-template-columns:1fr 70px 90px;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.08)}.metricName{font-weight:900;color:#dbeafe;font-size:14px}.metricVal{font-weight:1000;text-align:right;font-size:17px}.barWrap{height:12px;background:rgba(255,255,255,.12);border-radius:999px;overflow:hidden}.bar{height:100%;border-radius:999px}.tiles{padding:13px;display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.tile{border:1px solid rgba(255,255,255,.16);border-radius:13px;padding:12px;background:rgba(255,255,255,.055);text-align:center}.tile .k{font-size:11px;color:var(--muted);font-weight:950;text-transform:uppercase;letter-spacing:.6px}.tile .v{font-size:25px;font-weight:1000;margin-top:6px}.qualityDonut{width:150px;height:150px;border-radius:50%;margin:22px auto 14px;background:conic-gradient(var(--green) 0 73%,var(--yellow) 73% 89%,var(--bad) 89% 100%);display:flex;align-items:center;justify-content:center;box-shadow:0 0 0 10px rgba(255,255,255,.04)}.donutInner{width:94px;height:94px;border-radius:50%;background:#08203a;display:flex;align-items:center;justify-content:center;flex-direction:column;border:1px solid rgba(255,255,255,.14)}.donutInner .v{font-size:30px;font-weight:1000}.donutInner .k{font-size:11px;color:var(--muted);font-weight:900;text-transform:uppercase}.diagStrip{padding:0 24px 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.diagBox{border:1px solid var(--line);border-radius:15px;background:rgba(255,255,255,.055);padding:14px}.diagBox .k{font-size:12px;color:var(--muted);font-weight:950;text-transform:uppercase;letter-spacing:.7px}.diagBox .v{font-size:25px;font-weight:1000;margin-top:5px}.footer{border-top:1px solid var(--line);padding:16px 24px 18px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;color:#b9c7db;font-weight:900;font-size:13px}.watermark{color:#ff385c;font-weight:1000}@media(max-width:900px){.hero{grid-template-columns:110px 1fr;gap:14px}.scoreBox{grid-column:1/-1}.headshot{width:110px;height:110px}.name{font-size:32px}.summaryGrid{grid-template-columns:repeat(2,1fr)}.summaryCell{border-radius:0!important}.mainGrid,.diagStrip,.primaryBand{grid-template-columns:1fr}.metricRow{grid-template-columns:1fr 60px 80px}}
  </style>
</head>
<body>
  <div class="appTop"><div class="appTitle">Braves Prospect Card Generator</div><div class="controls"><select id="playerSelect"></select><button id="genBtn">Generate</button><button id="pngBtn">Export PNG</button></div></div><div id="status"></div><div class="stage"><div id="cardArea"></div></div>
  <script>
    const SHEET_URL="https://docs.google.com/spreadsheets/d/13D5cvWOVv9u7zOOQzT_jIoAMSu05NSWpX3KV4Y_aT0A/gviz/tq?tqx=out:csv&sheet=Hitters";let players=[];
    function parseCSV(text){const lines=text.split(/\r?\n/).filter(l=>l.trim()!=='');return lines.map(line=>{let out=[],cur='',inQ=false;for(let i=0;i<line.length;i++){const ch=line[i];if(ch==='"'){inQ=!inQ;continue}if(ch===','&&!inQ){out.push(cur);cur='';continue}cur+=ch}out.push(cur);return out.map(s=>s.trim())})}
    function safe(v){return(v===undefined||v===null||String(v).trim()==='')?'—':String(v).trim()}function n(v){const x=Number(String(v??'').replace('%','').trim());return Number.isFinite(x)?x:null}function fmt(v,d=1){const x=n(v);return x===null?'—':x.toFixed(d).replace(/\.0$/,'')}function setStatus(m){document.getElementById('status').textContent=m}
    function sevHitter(stat,v){const x=n(v);if(x===null)return null;if(stat==='Chase%')return x<26?0:x<=30?1:2;if(stat==='K%')return x<=22?0:x<=26?1:2;if(stat==='BB%')return x>=10?0:x>=8?1:2;if(stat==='Whiff%')return x<=22?0:x<=26?1:2;if(stat==='ZoneContact%')return x>=84?0:x>=80?1:2;if(stat==='O-Contact %'||stat==='O-Contact%')return x>=65?0:x>=55?1:2;if(stat==='GB%')return x<=45?0:x<=50?1:2;if(stat==='HardHit%')return x>42?0:x>=36?1:2;if(stat==='Barrel%')return x>9?0:x>=6?1:2;return null}
    const W_H={BBK:{'K%':.45,'BB%':.35,'Chase%':.20},CONTACT:{'Whiff%':.45,'ZoneContact%':.35,'O-Contact %':.20},ISO:{'GB%':.35,'HardHit%':.35,'Barrel%':.30}};
    function weightedScore(sevMap,weights){let num=0,den=0,red=false;for(const[k,w]of Object.entries(weights)){let s=sevMap[k];if(s===undefined&&k==='O-Contact %')s=sevMap['O-Contact%'];if(s===null||s===undefined)continue;num+=w*s;den+=w;if(s===2)red=true}if(!den)return{score:null,red:false};return{score:num/den,red}}
    function color(score,red){if(score===null)return'#334155';let c=score<.5?'#22c55e':score<1.25?'#fbbf24':'#ef4444';if(red&&c==='#22c55e')c='#fbbf24';return c}function topDrivers(sevMap,weights){const items=Object.entries(weights).map(([k,w])=>{let s=sevMap[k];if(s===undefined&&k==='O-Contact %')s=sevMap['O-Contact%'];return{k,contrib:s==null?null:w*s}}).filter(x=>x.contrib!==null).sort((a,b)=>b.contrib-a.contrib);if(!items.length)return[];const top=items[0].contrib;return items.filter(x=>(top-x.contrib)<=.05&&x.contrib>0).map(x=>x.k)}function labelFor(c){return c==='#ef4444'?'Primary Limiting Factor':'Primary Development Lever'}function pctWidth(v,min,max,invert=false){const x=n(v);if(x===null)return 0;let p=(x-min)/(max-min);if(invert)p=1-p;return Math.max(8,Math.min(100,p*100))}function barRow(name,val,width,color){return `<div class="metricRow"><div class="metricName">${name}</div><div class="metricVal">${val}</div><div class="barWrap"><div class="bar" style="width:${width}%;background:${color}"></div></div></div>`}function tile(k,v){return `<div class="tile"><div class="k">${k}</div><div class="v">${v}</div></div>`}function diag(k,v){return `<div class="diagBox"><div class="k">${k}</div><div class="v">${v}</div></div>`}function buildHeadshotURL(p){const direct=safe(p.HeadshotURL);if(direct!=='—')return direct;const id=safe(p.MLBAMID);return id!=='—'?`https://img.mlbstatic.com/mlb-photos/image/upload/w_400,q_auto:best/v1/people/${id}/headshot/67/current`:''}
    function generateCard(){const p=players[Number(document.getElementById('playerSelect').value||0)];if(!p)return;const sev={};['BB%','K%','Chase%','Whiff%','ZoneContact%','O-Contact %','O-Contact%','GB%','HardHit%','Barrel%'].forEach(k=>sev[k]=sevHitter(k,p[k]));const b1=weightedScore(sev,W_H.BBK),b2=weightedScore(sev,W_H.CONTACT),b3=weightedScore(sev,W_H.ISO);const c1=color(b1.score,b1.red),c2=color(b2.score,b2.red),c3=color(b3.score,b3.red);const buckets=[{name:'BB/K',score:b1.score??-1,border:c1,drivers:topDrivers(sev,W_H.BBK)},{name:'Contact%',score:b2.score??-1,border:c2,drivers:topDrivers(sev,W_H.CONTACT)},{name:'ISO',score:b3.score??-1,border:c3,drivers:topDrivers(sev,W_H.ISO)}].filter(b=>b.score>=0).sort((a,b)=>b.score-a.score);const primary=buckets[0]||{name:'—',border:'#334155',drivers:[]};const head=buildHeadshotURL(p);const playerName=safe(p.Name);const rank=(playerName.match(/^\s*([0-9]+\.?)/)||[])[1]||'';const cleanName=playerName.replace(/^\s*[0-9]+\.\s*/,'');const updated=safe(p.LastUpdated);const final=fmt(p['Final Score'],2);document.getElementById('cardArea').innerHTML=`<div class="card" id="playerCard"><div class="hero"><div class="headshot">${head?`<img src="${head}" onerror="this.remove();this.parentNode.textContent='PHOTO';">`:'PHOTO'}</div><div><div class="rankName">${rank?`<div class="rank">#${rank.replace('.','')}</div>`:''}<h1 class="name">${cleanName}</h1></div><div class="subtitle">Atlanta Braves Hitting Prospect Card</div><div class="pills"><div class="pill">Level: ${safe(p.Level)}</div><div class="pill">AgeDiff: ${safe(p.AgeDiff)}</div><div class="pill">AB: ${safe(p.AB)}</div><div class="pill">Updated: ${updated}</div></div></div><div class="scoreBox"><div class="k">Final Score</div><div class="v">${final}</div><div class="s">Readiness model output</div></div></div><div class="primaryBand"><div class="callout"><div class="k">${labelFor(primary.border)}</div><div class="v">${primary.name}</div></div><div class="callout"><div class="k">Primary Drivers</div><div class="v">${primary.drivers.length?primary.drivers.join(' + '):'No major red diagnostic'}</div></div></div><div class="summaryGrid"><div class="summaryCell"><div class="k">Level</div><div class="v">${safe(p.Level)}</div><div class="s">Current assignment</div></div><div class="summaryCell"><div class="k">AgeDiff</div><div class="v">${safe(p.AgeDiff)}</div><div class="s">vs level</div></div><div class="summaryCell"><div class="k">BB/K</div><div class="v">${safe(p['BB/K'])}</div><div class="s">discipline output</div></div><div class="summaryCell"><div class="k">Contact%</div><div class="v">${safe(p['Contact%'])}</div><div class="s">bat-to-ball</div></div><div class="summaryCell"><div class="k">ISO</div><div class="v">${safe(p.ISO)}</div><div class="s">impact</div></div><div class="summaryCell"><div class="k">wRC+</div><div class="v">${safe(p['wRC+'])}</div><div class="s">production</div></div></div><div class="mainGrid"><div class="panel"><div class="panelTitle">Decision / Approach</div><div class="statRows">${barRow('BB%',safe(p['BB%']),pctWidth(p['BB%'],4,16),'linear-gradient(90deg,#22c55e,#86efac)')}${barRow('K%',safe(p['K%']),pctWidth(p['K%'],12,34,true),'linear-gradient(90deg,#22c55e,#fbbf24,#ef4444)')}${barRow('Chase%',safe(p['Chase%']),pctWidth(p['Chase%'],18,36,true),'linear-gradient(90deg,#22c55e,#fbbf24,#ef4444)')}${barRow('BB/K',safe(p['BB/K']),pctWidth(p['BB/K'],.2,1.1),'linear-gradient(90deg,#fbbf24,#22c55e)')}</div></div><div class="panel"><div class="panelTitle">Contact Skills</div><div class="qualityDonut"><div class="donutInner"><div class="v">${safe(p['Contact%'])}</div><div class="k">Contact%</div></div></div><div class="tiles">${tile('Z-Contact%',safe(p['ZoneContact%']))}${tile('Whiff%',safe(p['Whiff%']))}${tile('O-Contact%',safe(p['O-Contact %']||p['O-Contact%']))}${tile('AB',safe(p.AB))}</div></div><div class="panel"><div class="panelTitle">Impact / Batted Ball</div><div class="statRows">${barRow('HardHit%',safe(p['HardHit%']),pctWidth(p['HardHit%'],25,55),'linear-gradient(90deg,#fbbf24,#ef4444)')}${barRow('Barrel%',safe(p['Barrel%']),pctWidth(p['Barrel%'],2,16),'linear-gradient(90deg,#fbbf24,#ef4444)')}${barRow('AvgEV',safe(p.AvgEV),pctWidth(p.AvgEV,82,94),'linear-gradient(90deg,#fbbf24,#ef4444)')}${barRow('GB%',safe(p['GB%']),pctWidth(p['GB%'],30,55,true),'linear-gradient(90deg,#22c55e,#fbbf24,#ef4444)')}${barRow('Pull%',safe(p['Pull%']),pctWidth(p['Pull%'],30,55),'linear-gradient(90deg,#60a5fa,#fbbf24)')}</div></div></div><div class="diagStrip">${diag('Primary Lever',primary.name)}${diag('Drivers',primary.drivers.length?primary.drivers.join(' + '):'—')}${diag('Model Note',`${safe(p['wRC+'])} wRC+ / ${safe(p.AB)} AB sample`)}</div><div class="footer"><div class="watermark">@BravesStatsFarm</div><div>Updated: ${updated} • Data: Google Sheet live feed</div></div></div>`}
    async function exportPNG(){const card=document.getElementById('playerCard');if(!card){setStatus('Generate a card first.');return}const canvas=await html2canvas(card,{scale:2,backgroundColor:null,useCORS:true});const a=document.createElement('a');a.href=canvas.toDataURL('image/png');a.download='braves-prospect-card.png';a.click()}
    fetch(SHEET_URL).then(r=>r.text()).then(text=>{const rows=parseCSV(text);headers=rows[0].map(h=>String(h||'').replace(/^\uFEFF/,'').trim());players=rows.slice(1).map(r=>{const o={};headers.forEach((h,i)=>o[h]=(r[i]??'').trim());return o}).filter(p=>safe(p.Name)!=='—');const sel=document.getElementById('playerSelect');sel.innerHTML='';players.forEach((p,i)=>{const opt=document.createElement('option');opt.value=i;opt.textContent=safe(p.Name);sel.appendChild(opt)});setStatus(`Loaded ${players.length} hitters from live Google Sheet.`);if(players.length)generateCard()}).catch(()=>setStatus('Could not load Google Sheet data. Check sharing/link settings.'));
    document.getElementById('genBtn').addEventListener('click',generateCard);document.getElementById('pngBtn').addEventListener('click',exportPNG);
  </script>
</body>
</html>
